<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Manajemen Jadwal Mahasiswa</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --glass-bg: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.12);
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; min-height: 100vh; background: #0f172a; display: flex; justify-content: center; align-items: center; color: white; padding: 15px; }

        .app-card {
            width: 100%; max-width: 400px; height: 700px;
            background: var(--glass-bg); backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 30px;
            display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        .header { padding: 30px 20px; text-align: center; border-bottom: 1px solid var(--glass-border); }
        .page { display: none; flex-direction: column; height: 100%; padding: 20px; overflow-y: auto; }
        .active { display: flex; }

        .input-group { margin-bottom: 15px; }
        input, select {
            width: 100%; padding: 14px; background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border); border-radius: 12px; color: white; outline: none;
        }

        .btn {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            font-weight: 700; cursor: pointer; margin-top: 10px;
        }
        .btn-main { background: var(--primary); color: white; }
        .btn-dash { background: var(--glass-bg); color: white; border: 1px solid var(--glass-border); text-align: left; }

        .schedule-item { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; margin-bottom: 10px; border-left: 4px solid var(--primary); }
        .day-header { color: var(--primary); font-weight: 700; margin-top: 15px; font-size: 0.9rem; }

        #customAlert {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: #6366f1; padding: 15px 30px; border-radius: 50px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2); display: none; z-index: 1000;
        }
    </style>
</head>
<body>

<div id="customAlert">Pesan Berhasil</div>

<div class="app-card">
    <div id="loginPage" class="page active">
        <div class="header"><h2>LOGIN</h2></div>
        <div style="margin-top: 40px;">
            <div class="input-group">
                <label>Email</label>
                <input type="email" placeholder="mahasiswa@univ.ac.id">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" placeholder="••••••••">
            </div>
            <button class="btn btn-main" onclick="nav('dashboardPage')">LOGIN</button>
        </div>
    </div>

    <div id="dashboardPage" class="page">
        <div class="header"><h2>DASHBOARD</h2></div>
        <div style="margin-top: 20px;">
            <button class="btn btn-dash" onclick="nav('rekapPage')">Jadwal Kuliah</button>
<button class="btn btn-dash" onclick="nav('rekapPage')">Rekap Jadwal</button>
<button class="btn btn-dash" onclick="nav('agendaPage')">⏱Agenda Harian</button>
            <button class="btn btn-dash" onclick="toast('Profil: Mahasiswa Aktif')">Profil</button>
            <button class="btn btn-main" style="margin-top: 50px;" onclick="nav('loginPage')">LOGOUT</button>
        </div>
    </div>

    <div id="inputPage" class="page">
        <div class="header"><h2>INPUT JADWAL</h2></div>
        <div style="margin-top: 10px;">
            <input type="text" id="m" class="input-group" placeholder="Mata Kuliah">
            <select id="h" class="input-group">
                <option value="Senin">Senin</option><option value="Selasa">Selasa</option>
                <option value="Rabu">Rabu</option><option value="Kamis">Kamis</option>
                <option value="Jumat">Jumat</option>
            </select>
            <input type="time" id="j" class="input-group">
            <input type="text" id="r" class="input-group" placeholder="Ruangan">
            <button class="btn btn-main" onclick="simpanData()">SIMPAN DATA JADWAL</button>
            <button class="btn btn-main" onclick="nav('rekapPage')">BATAL</button>
        </div>
    </div>

    <div id="rekapPage" class="page">
        <div class="header"><h2>REKAP JADWAL</h2></div>
        <div id="rekapList" style="flex-grow: 1;"></div>
        <button class="btn btn-main" onclick="nav('inputPage')">[ + Tambah Jadwal ]</button>
        <button class="btn btn-dash" onclick="nav('dashboardPage')">Kembali</button>
    </div>

    <div id="agendaPage" class="page">
        <div class="header"><h2>AGENDA HARI INI</h2></div>
        <div id="agendaList" style="flex-grow: 1;"></div>
        <button class="btn btn-dash" onclick="nav('dashboardPage')">Kembali</button>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('mhs_db')) || [];

    function toast(msg) {
        const t = document.getElementById('customAlert');
        t.innerText = msg; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2000);
    }

    function nav(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'rekapPage') renderRekap();
        if(id === 'agendaPage') renderAgenda();
    }

    function simpanData() {
        const data = {
            matkul: document.getElementById('m').value,
            hari: document.getElementById('h').value,
            jam: document.getElementById('j').value,
            ruangan: document.getElementById('r').value
        };
        if(!data.matkul || !data.jam) return toast("Lengkapi data!");
        
        db.push(data);
        localStorage.setItem('mhs_db', JSON.stringify(db));
        toast("Data Disimpan!");
        nav('rekapPage');
    }

    function renderRekap() {
        const area = document.getElementById('rekapList');
        area.innerHTML = "";
        const days = ["Senin", "Selasa", "Rabu", "Kamis", "Jumat"];
        
        days.forEach(day => {
            let filtered = db.filter(x => x.hari === day);
            filtered.sort((a, b) => a.jam.localeCompare(b.jam));
            
            if(filtered.length > 0) {
                area.innerHTML += `<div class="day-header">${day}</div>`;
                filtered.forEach(i => {
                    area.innerHTML += `<div class="schedule-item"><strong>${i.jam} - ${i.matkul}</strong><br><small>Ruang: ${i.ruangan}</small></div>`;
                });
            }
        });
    }

    function renderAgenda() {
        const area = document.getElementById('agendaList');
        const d = new Date();
        const hariIni = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"][d.getDay()];
        
        area.innerHTML = `<p style="text-align:center">Hari ini: <b>${hariIni}</b></p>`;
        
        let filtered = db.filter(x => x.hari === hariIni);
        filtered.sort((a, b) => a.jam.localeCompare(b.jam));

        if(filtered.length > 0) {
            filtered.forEach(i => {
                area.innerHTML += `<div class="schedule-item"><strong>${i.jam} - ${i.matkul}</strong><br><small>Ruang: ${i.ruangan}</small></div>`;
            });
        } else {
            area.innerHTML += "<p style='text-align:center; opacity:0.5'>Tidak ada agenda kuliah hari ini.</p>";
        }
    }
</script>

</body>
</html>
