name: Build Android APK
on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Cordova & Jetifier
        run: |
          npm install -g cordova
          npm install -g jetifier

      - name: Build APK
        run: |
          cordova platform add android@13.0.0
          echo "Migrating Java source files..."
          find platforms/android/app/src/main/java -name "*.java" -exec sed -i 's/android.support.v4.media.session.MediaSessionCompat/androidx.media.MediaSessionCompat/g' {} +
          find platforms/android/app/src/main/java -name "*.java" -exec sed -i 's/androidx.v4.media.session.MediaSessionCompat/androidx.media.MediaSessionCompat/g' {} +
          find platforms/android/app/src/main/java -name "*.java" -exec sed -i 's/android.support.v4.app.NotificationCompat/androidx.core.app.NotificationCompat/g' {} +
          find platforms/android/app/src/main/java -name "*.java" -exec sed -i 's/android.support.v4.app.NotificationManagerCompat/androidx.core.app.NotificationManagerCompat/g' {} +
          find platforms/android/app/src/main/java -name "*.java" -exec sed -i 's/android.support.v4.app.RemoteInput/androidx.core.app.RemoteInput/g' {} +
          find platforms/android/app/src/main/java -name "*.java" -exec sed -i 's/android.support.v4.content.FileProvider/androidx.core.content.FileProvider/g' {} +
          find platforms/android/app/src/main/java -name "*.java" -exec sed -i 's/android.support./androidx./g' {} +
          find platforms/android/ -name "*.gradle" -exec sed -i 's/compile /implementation /g' {} +
          echo "dependencies { implementation 'androidx.media:media:1.7.0' }" > platforms/android/app/build-extras.gradle
          echo "android.useAndroidX=true" >> platforms/android/gradle.properties
          echo "android.enableJetifier=true" >> platforms/android/gradle.properties
          cordova build android --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
          compression-level: 0
