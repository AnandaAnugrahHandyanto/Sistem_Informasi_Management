<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Dashboard</title>
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
      <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="dashboard.css" />
    <link rel="stylesheet" href="toast.css" />
  </head>

  <body>
    <div class="container">
      <!-- HEADER -->
      <div class="header">
        <div class="header-top">
          <div class="avatar">A</div>
          <div>
            <h2 id="greeting">Halo</h2>
            <p id="date"></p>
          </div>
        </div>
        <div class="stats">
          <div class="stat">
            <div class="stat-value" id="todayCount">0</div>
            <div class="stat-label">Jadwal hari ini</div>
          </div>
          <div class="stat">
            <div class="stat-value" id="agendaCount">0</div>
            <div class="stat-label">Agenda</div>
          </div>
          <div class="stat">
            <div class="stat-value" id="reminderCount">0</div>
            <div class="stat-label">Reminder</div>
          </div>
        </div>
      </div>

      <!-- CARD -->
      <div class="cards">
        <div class="card">
          <h3>Jadwal Hari Ini</h3>
          <div id="jadwalList"></div>
        </div>

        <div class="card">
          <h3>Agenda</h3>
          <ul id="agendaList"></ul>
        </div>

        <div class="card">
          <h3>Reminder</h3>
          <ul id="reminderList"></ul>
        </div>
      </div>
    </div>

    <!-- NAVBAR -->
    <div class="navbar">
      <div class="nav-item active" onclick="goDashboard()">
        <i class="bx bx-home"></i>
      </div>
      <div class="nav-item" onclick="goJadwal()">
        <i class="bx bx-book"></i>
      </div>
      <div class="nav-item" onclick="goRekap()">
        <i class="bx bx-bar-chart"></i>
      </div>
      <div class="nav-item" onclick="goAgenda()">
        <i class="bx bx-task"></i>
      </div>
    </div>

    <script src="toast.js"></script>
    <script src="dashboard.js"></script>
  </body>
</html>
