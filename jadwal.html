<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jadwal Kuliah</title>
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="jadwal.css" />
  </head>

  <body>
    <div class="app">
      <!-- header -->
      <div class="header">
        <h2>Jadwal Kuliah</h2>
        <button onclick="backDashboard()" class="dashboard-btn">
          <span
            class="material-symbols-outlined"
            style="font-size: 18px; margin-right: 8px; vertical-align: middle"
            >arrow_left</span
          >
          Kembali ke Dashboard
        </button>
      </div>

      <!-- tab -->
      <div class="tabs">
        <button class="active">Minggu Ini</button>
        <button>Kalender</button>
      </div>

      <!-- grid -->
      <div class="grid" id="grid"></div>

      <button class="add-btn" onclick="openModal()">+ Tambah Jadwal</button>
    </div>

    <!-- modal -->
    <div class="modal" id="modal">
      <div class="modal-content">
        <h3>Tambah Jadwal</h3>

        <input type="text" id="matkul" placeholder="Mata Kuliah" />

        <select id="hari">
          <option value="1">Senin</option>
          <option value="2">Selasa</option>
          <option value="3">Rabu</option>
          <option value="4">Kamis</option>
          <option value="5">Jumat</option>
        </select>

        <div style="display: flex; gap: 8px">
          <input type="time" id="jamMulai" value="08:00" step="60" />
          <input type="time" id="jamSelesai" value="09:30" step="60" />
        </div>

        <select id="warna">
          <option value="blue">Biru</option>
          <option value="green">Hijau</option>
          <option value="orange">Orange</option>
          <option value="red">Merah</option>
        </select>

        <button onclick="tambahJadwal()">Simpan</button>
        <button onclick="closeModal()" class="cancel">Batal</button>
      </div>
    </div>

    <!-- navbar -->
    <div class="navbar">
      <div class="nav-item active" onclick="goDashboard()">
        <i class="bx bx-home"></i>
      </div>
      <div class="nav-item" onclick="goJadwal()">
        <i class="bx bx-book"></i>
      </div>
      <div class="nav-item" onclick="goRekap()">
        <i class="bx bx-bar-chart"></i>
      </div>
      <div class="nav-item" onclick="goAgenda()">
        <i class="bx bx-task"></i>
      </div>
    </div>

    <script src="toast.js"></script>
    <script src="jadwal.js"></script>
  </body>
</html>
